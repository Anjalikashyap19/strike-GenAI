<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Madak Mahal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            overflow: hidden;
            background: #0b1419;
        }

        /* INTRO SCREEN */

        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;

            background: url("https://images.unsplash.com/photo-1522383225653-ed111181a951") center/cover no-repeat;

            display: flex;
            align-items: center;

            padding-left: 120px;

            color: white;

            z-index: 9999;
            transition: 0.5s;
        }

        /* overlay */

        #intro::before {

            content: "";

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, .35);

            transition: .5s;

        }

        /* fade background when typing */

        .focus-mode::before {

            background: rgba(0, 0, 0, .65);

        }

        /* hero text */

        .hero {

            position: relative;

            max-width: 500px;

            z-index: 2;

        }

        .hero h1 {

            font-size: 50px;

            letter-spacing: 1px;

            margin-bottom: 5px;

        }

        .hero p {

            font-size: 26px;

            opacity: .85;

            margin-bottom: 30px;

        }

        /* SEARCH */

        .search-box {

            width: 520px;
            height: 45px;

            border-radius: 10px;

            padding: 0 30px;

            display: flex;
            align-items: center;

            background: rgba(255, 255, 255, .25);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .6);

            box-shadow: 0 15px 50px rgba(0, 0, 0, .6);

            font-size: 20px;

            transition: .4s;

        }

        .focus-mode .search-box {

            transform: scale(1.05);

            box-shadow: 0 0 35px rgba(255, 255, 255, .9);

        }

        #searchText::after {

            content: "|";

            animation: blink 1s infinite;

        }

        @keyframes blink {

            0% {
                opacity: 1
            }

            50% {
                opacity: 0
            }

            100% {
                opacity: 1
            }

        }

        /* RIGHT IMAGES GRID */

        .cards {

            position: absolute;

            right: 120px;

            display: grid;

            grid-template-columns: repeat(2, 160px);

            gap: 20px;

            z-index: 2;

        }

        .card {

            width: 160px;
            height: 210px;

            border-radius: 14px !important;

            overflow: hidden;

            background: rgba(255, 255, 255, .2);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .4);

            transition: .4s;

        }

        .card img {

            width: 100%;
            height: 100%;
            object-fit: cover;

        }

        .card:hover {

            transform: translateY(-10px) scale(1.05);

        }

        /* BOTTOM BIG PANELS */

        .bottom-panels {

            position: absolute;

            bottom: 20px;

            left: 120px;

            display: flex;

            gap: 25px;

            z-index: 2;

        }
       

        .panel {

            width: 180px;
            height: 80px;

            border-radius: 12px;

            background: rgba(255, 255, 255, .25);

            backdrop-filter: blur(14px);

            border: 1px solid rgba(255, 255, 255, .5);

            display: flex;

            align-items: center;

            justify-content: space-between;

            padding: 20px;

            font-size: 12px;

            cursor: pointer;

            transition: .3s;

        }

        .panel:hover {

            transform: translateY(-6px);

            background: rgba(255, 255, 255, .35);

        }

        .panel span {

            font-size: 14px;

        }

        /* arrow icon */

        .arrow {

            font-size: 20px;

            opacity: .8;

        }

        /* side dots */

        .dots {

            position: absolute;

            right: 40px;

            top: 50%;

            transform: translateY(-50%);

            display: flex;

            flex-direction: column;

            gap: 14px;

            z-index: 2;

        }

        .dot {

            width: 10px;
            height: 10px;

            background: white;

            border-radius: 50%;

            opacity: .6;

        }

        /* zoom animation */

        .zoom {

            animation: zoomOut 1s forwards;

        }

        @keyframes zoomOut {

            0% {
                transform: scale(1);
                filter: blur(0);
            }

            100% {
                transform: scale(1.3);
                filter: blur(12px);
                opacity: 0;
            }

        }

        /* MAIN WEBSITE */

        #mainSite {

            display: none;

            height: 100vh;

            color: white;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 60px;

            background: #0b1419;

        }

     .cards{
display:flex;
gap:30px;
align-items:flex-start; /* both start same level */
}

.card{
position:relative;

width:200px;
height:320px;

border-radius:22px;
overflow:hidden;

box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

/* second card taller */

.card-large{
height:420px;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* gradient */

.card::before{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:55%;
background:linear-gradient(to top,rgba(0,0,0,0.65),transparent);
}

/* glass caption */

.card-info{
position:absolute;
bottom:1px;
left:50%;
transform:translateX(-50%);

width:100%;
padding:14px;



background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);

text-align:center;
color:white;
}

.weather-widget{
position:absolute;
top:-100px;
left:-10px;

display:flex;
align-items:center;
gap:16px;

color:white;
}

.weather-icon{
font-size:48px;
}

.weather-info{
display:flex;
flex-direction:column;
}

.temp{
font-size:48px;
font-weight:600;
line-height:1;
}

.feels{
font-size:16px;
opacity:0.8;
}

.search-icon{
font-size:18px;

cursor:pointer;
}

#searchText{
flex:1;
}


/* ---------- Large laptops ---------- */

@media (max-width:1400px){

#intro{
padding-left:60px;
}

.cards{
right:60px;
}

.bottom-panels{
left:60px;
}

}

/* ---------- Normal laptops ---------- */

@media (max-width:1200px){

.hero h1{
font-size:42px;
}

.hero p{
font-size:20px;
}

.search-box{
width:420px;
}

.cards{
right:40px;
transform:scale(.9);
}

.bottom-panels{
gap:15px;
}

.panel{
width:160px;
height:70px;
}

}

/* ---------- Small laptops ---------- */

@media (max-width:1000px){

.cards{
display:none; /* hide side cards */
}

.dots{
display:none;
}

.search-box{
width:360px;
}

.bottom-panels{
left:50px;
flex-wrap:wrap;
max-width:500px;
}

}

/* ---------- Tablet ---------- */

@media (max-width:768px){

#intro{
display:none; /* disable animation */
}

#mainSite{
display:flex;
}

body{
overflow:auto;
}

}

/* ---------- Mobile ---------- */

@media (max-width:480px){

#intro{
display:none;
}

#mainSite{
display:flex;
}

body{
overflow:auto;
}

}


    </style>

</head>

<body>

    <div id="intro">

        <div class="hero">
            <div class="weather-widget">
            
                <div class="weather-icon">
                    <i class="fa-solid fa-cloud-sun"></i>
                </div>
            
                <div class="weather-info">
                    <div class="temp">33°</div>
                    <div class="feels">Feels like 40°</div>
                </div>
            
            </div>
            
            <h1>Modak Mahal</h1>
            <p>Sweet Mahal Lorem ipsum dolor sit amet.</p>


           
        <div class="search-box">
        
            <span id="searchText"></span>
        
            <i class="fa fa-search search-icon" aria-hidden="true"></i>
        
        </div>


        </div>

        <!-- right images -->

      <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff" alt="">

        ```
        <div class="card-info">
            <h3>Shinjuku Gyo-en</h3>
            <p>Tokyo Prefecture</p>
        </div>
        ```

    </div>

    <div class="card card-large">
        <img src="https://images.unsplash.com/photo-1549692520-acc6669e2f0c" alt="">

        ```
        <div class="card-info">
            <h3>Yoyogi Gyo-en</h3>
            <p>Tokyo Prefecture</p>
        </div>
        ```

    </div>

</div>


        <!-- bottom big cards -->

        <div class="bottom-panels">

            <div class="panel">
                <span>Explore Sweets</span>
                
                <div class="arrow"><i class="fa fa-chevron-right" aria-hidden="true"></i></div>
            </div>

            <div class="panel">
                <span>Order Online</span>
                <div class="arrow"><i class="fa fa-chevron-right" aria-hidden="true"></i></div>
            </div>

            <div class="panel">
                <span>Best Offers</span>
                <div class="arrow"><i class="fa fa-chevron-right" aria-hidden="true"></i></div>
            </div>

            <div class="panel">
                <span>Visit Store</span>
                <div class="arrow"><i class="fa fa-chevron-right" aria-hidden="true"></i></div>
            </div>

        </div>

        <div class="dots">

            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>

        </div>

    </div>

    <div id="mainSite">

        Welcome To Madak Mahal 🍰

    </div>

   
</body>

</html>
