<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Background Remover — Anjali Tools</title>
    <meta name="description"
        content="Remove background from photos instantly in your browser — 100% private, no upload." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <style>
        :root {
            --bg: #f8faff;
            --card: #ffffff;
            --accent: #4361ee;
            --accent-hover: #3b56d8;
            --text: #1e293b;
            --text-light: #64748b;
            --border: rgba(67, 97, 238, 0.2);
            --radius: 18px;
            --shadow: 0 12px 35px rgba(67, 97, 238, 0.14);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 24px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 36px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #5b8cff);
          
            color: #f8faff;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 16px;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 28px;
            align-items: start;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .upload-area {
            border: 3px dashed var(--border);
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(67, 97, 238, 0.04);
            user-select: none;
        }

        .upload-area:hover,
        .upload-area.drag {
            border-color: var(--accent);
            background: rgba(67, 97, 238, 0.1);
            transform: translateY(-4px);
        }

        .upload-icon {
            font-size: 60px;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .upload-title {
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 14px;
            color: var(--text-light);
        }

        .form-group {
            margin-top: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        select,
        input[type="color"] {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 2px solid var(--border);
            font-size: 15px;
            background: white;
            transition: border 0.3s;
        }

        select:focus,
        input[type="color"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
        }

        input[type="color"] {
            height: 56px;
            padding: 4px;
            cursor: pointer;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
            margin-top: 28px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(67, 97, 238, 0.08);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .preview-card {
            position: relative;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 18px;
        }

        .status {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        .canvas-container {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.06);
        }

        canvas {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .mask-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-light);
        }

        .mask-control input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-light);
            font-size: 14px;
        }

        @media (max-width: 920px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Background Remover</h1>
            <p class="tagline">Remove backgrounds instantly in your browser — 100% private, no uploads, no server.</p>
        </header>

        <div class="grid">
            <!-- Controls -->
            <div class="card">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">Photo</div>
                    <div class="upload-title">Drop your photo here</div>
                    <div class="upload-hint">or click to browse • Supports JPG, PNG</div>
                    <input id="fileInput" type="file" accept="image/*" />
                </div>

                <div class="form-group">
                    <label>Model Quality</label>
                    <select id="modelQuality">
                        <option value="low">Fast (Low Quality)</option>
                        <option value="medium" selected>Balanced (Recommended)</option>
                        <option value="high">Best Quality (Slower)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Output Background</label>
                    <select id="outputMode">
                        <option value="transparent" selected>Transparent (PNG)</option>
                        <option value="color">Solid Color</option>
                    </select>
                </div>

                <div id="bgColorPicker" style="display:none;">
                    <div class="form-group">
                        <label>Background Color</label>
                        <input type="color" id="bgColor" value="#ffffff" />
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-primary" id="removeBtn" disabled>
                        Remove Background
                    </button>
                    <button class="btn-secondary" id="downloadBtn" disabled>
                        Download PNG
                    </button>
                    <button class="btn-secondary" id="resetBtn">
                        Reset
                    </button>
                </div>
            </div>

            <!-- Preview -->
            <div class="card preview-card">
                <div class="preview-header">
                    <div>Live Preview</div>
                    <div class="status" id="status">Model loading...</div>
                </div>

                <div class="canvas-container">
                    <canvas id="resultCanvas"></canvas>
                    <canvas id="sourceCanvas" style="display:none"></canvas>
                </div>

                <div class="mask-control">
                    <span>Mask Opacity</span>
                    <input type="range" id="maskRange" min="0" max="1" step="0.05" value="1" />
                </div>

                <div class="footer">
                    100% Private — Your image never leaves your device.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.0.5/dist/body-pix.js"></script>

    <script>
        (function () {
            const fileInput = document.getElementById('fileInput');
            const uploadArea = document.getElementById('uploadArea');
            const removeBtn = document.getElementById('removeBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const resetBtn = document.getElementById('resetBtn');
            const modelQuality = document.getElementById('modelQuality');
            const outputMode = document.getElementById('outputMode');
            const bgColorPicker = document.getElementById('bgColorPicker');
            const bgColor = document.getElementById('bgColor');
            const statusEl = document.getElementById('status');
            const srcCanvas = document.getElementById('sourceCanvas');
            const resCanvas = document.getElementById('resultCanvas');
            const maskRange = document.getElementById('maskRange');

            let net = null;
            let img = null;

            const loadModel = async (quality) => {
                statusEl.textContent = 'Loading AI model...';
                const multiplier = quality === 'low' ? 0.5 : quality === 'medium' ? 0.75 : 1.0;
                const outputStride = quality === 'high' ? 8 : 16;
                net = await bodyPix.load({
                    architecture: 'MobileNetV1',
                    outputStride,
                    multiplier,
                    quantBytes: 2
                });
                statusEl.textContent = 'Ready — drop an image!';
            };
            loadModel('medium');

            // Fixed: Prevent double file picker
            uploadArea.addEventListener('click', (e) => {
                e.stopPropagation();   // This line fixes the bug!
                fileInput.click();
            });

            // Drag & Drop
            uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag'); });
            uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('drag');
                if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files[0]) handleFile(fileInput.files[0]);
            });

            function handleFile(file) {
                if (!file.type.startsWith('image/')) return alert('Please select an image');
                const reader = new FileReader();
                reader.onload = () => {
                    img = new Image();
                    img.onload = () => {
                        const maxW = 1200;
                        const scale = Math.min(1, maxW / img.width);
                        srcCanvas.width = Math.round(img.width * scale);
                        srcCanvas.height = Math.round(img.height * scale);
                        resCanvas.width = srcCanvas.width;
                        resCanvas.height = srcCanvas.height;

                        const ctx = srcCanvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, srcCanvas.width, srcCanvas.height);

                        const rctx = resCanvas.getContext('2d');
                        rctx.clearRect(0, 0, resCanvas.width, resCanvas.height);
                        rctx.drawImage(srcCanvas, 0, 0);

                        removeBtn.disabled = false;
                        downloadBtn.disabled = true;
                        statusEl.textContent = 'Image loaded — click Remove Background';
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            }

            outputMode.addEventListener('change', () => {
                bgColorPicker.style.display = outputMode.value === 'color' ? 'block' : 'none';
            });

            removeBtn.addEventListener('click', async () => {
                if (!img) return;
                removeBtn.disabled = true;
                statusEl.textContent = 'Removing background...';

                const desired = modelQuality.value;
                if (!net || (net.configuration?.multiplier !== (desired === 'low' ? 0.5 : desired === 'medium' ? 0.75 : 1.0))) {
                    await loadModel(desired);
                }

                const segmentation = await net.segmentPerson(srcCanvas, {
                    internalResolution: 'medium',
                    segmentationThreshold: 0.7,
                });

                const ctx = resCanvas.getContext('2d');
                ctx.drawImage(srcCanvas, 0, 0);
                const imgData = ctx.getImageData(0, 0, resCanvas.width, resCanvas.height);
                const data = imgData.data;

                for (let i = 0; i < segmentation.data.length; i++) {
                    data[i * 4 + 3] = segmentation.data[i] ? 255 * maskRange.value : 0;
                }
                ctx.putImageData(imgData, 0, 0);

                if (outputMode.value === 'color') {
                    const temp = document.createElement('canvas');
                    temp.width = resCanvas.width; temp.height = resCanvas.height;
                    const tctx = temp.getContext('2d');
                    tctx.fillStyle = bgColor.value;
                    tctx.fillRect(0, 0, temp.width, temp.height);
                    tctx.drawImage(resCanvas, 0, 0);
                    ctx.clearRect(0, 0, resCanvas.width, resCanvas.height);
                    ctx.drawImage(temp, 0, 0);
                }

                downloadBtn.disabled = false;
                statusEl.textContent = 'Done! Click Download';
                removeBtn.disabled = false;
            });

            downloadBtn.addEventListener('click', () => {
                resCanvas.toBlob(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = (fileInput.files[0]?.name.replace(/\.[^.]+$/, '') || 'image') + '_nobg.png';
                    a.click();
                }, 'image/png');
            });

            resetBtn.addEventListener('click', () => {
                img = null;
                srcCanvas.getContext('2d').clearRect(0, 0, srcCanvas.width, srcCanvas.height);
                resCanvas.getContext('2d').clearRect(0, 0, resCanvas.width, resCanvas.height);
                removeBtn.disabled = downloadBtn.disabled = true;
                fileInput.value = '';
                statusEl.textContent = 'Ready — drop an image';
            });

            maskRange.addEventListener('input', () => {
                statusEl.textContent = 'Opacity changed — click Remove to reapply';
            });
        })();
    </script>
</body>

</html>
