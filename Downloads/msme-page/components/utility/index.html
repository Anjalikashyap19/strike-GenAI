<button id="back-to-top-btn" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
</button>

<button id="chat-toggle-btn" aria-label="Open chat">
    <i class="fas fa-comment-dots"></i>
</button>
<div id="chat-window">
    <div class="chat-header">
        <span>Chat with an Expert</span>
        <button id="chat-close-btn" aria-label="Close chat">&times;</button>
    </div>
    <div class="chat-body" id="chat-body">
        <div class="chat-message bot">Hello! How can we help you with your GST Registration today?</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="chat-input" placeholder="Type your message...">
        <button id="chat-send-btn" aria-label="Send message"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
